  mybatis:
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
      mapUnderscoreToCamelCase: true  #命名自动转换
  #spring事务管理日志
  logging:
    level:
      org.springframework.jdbc.support.JdbcTransactionManager: debug
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

